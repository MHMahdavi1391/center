<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="eckEmKRcxO2-v0_uGxKgiAfYmNxzAT6_36wGXXYYWFs" />
    <title>LTC HUB — هاب Lumen Technologies Co.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <!-- ===== Header ===== -->
        <header class="header">
            <div class="logo-area">
                <i class="fas fa-bolt logo-icon"></i>
                <h1>LTC<span class="dot">.</span>HUB</h1>
            </div>
            <p class="subtitle">Lumen Technologies Co.</p>
            <p class="intro">دسترسی سریع به تمام سرویس‌ها و زیرمجموعه‌های شرکت</p>
        </header>

        <!-- ===== کارت‌ها ===== -->
        <section class="links-section">
            <div id="link-list" class="link-grid">
                <!-- کارت‌ها توسط JS ساخته می‌شوند -->
            </div>
            <div id="empty-state" class="empty-state" style="display: none;">
                <i class="fas fa-sitemap"></i>
                <p>در حال حاضر مسیریابی فعالی وجود ندارد.</p>
            </div>
        </section>

        <!-- ===== شماره تماس مدیر ===== -->
        <div class="contact-section">
            <div class="contact-card">
                <div class="contact-info">
                    <i class="fas fa-headset"></i>
                    <span class="contact-label">مدیریت:</span>
                    <span class="contact-number">۰۹۳۶۲۳۳۵۲۶۶</span>
                </div>
                <a href="tel:09362335266" class="call-btn">
                    <i class="fas fa-phone"></i>
                    تماس مستقیم
                </a>
            </div>
        </div>

        <!-- ===== Footer ===== -->
        <footer class="footer">
            <p>© Lumen Technologies Co. (LTC) — کلیه حقوق محفوظ است.</p>
            <p class="footer-credit">طراحی و توسعه با عشق</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
